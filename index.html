<!DOCTYPE html>    
<html lang="en">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>FLAMES Calculator 🔥</title>    
    
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">    
    
<style>    
body {    
  margin: 0;    
  height: 100vh;    
  font-family: 'Poppins', sans-serif;    
  background: radial-gradient(circle at top, #1a0000, #000);    
  overflow: hidden;    
  color: white;    
}    
    
.heart {    
  position: absolute;    
  color: rgba(255, 0, 100, 0.6);    
  animation: float 6s linear infinite;    
}    
    
@keyframes float {    
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }    
  50% { opacity: 1; }    
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }    
}    
    
.container {    
  position: absolute;    
  top: 50%;    
  left: 50%;    
  transform: translate(-50%, -50%);    
  text-align: center;    
}    
    
h1 {    
  font-size: 3rem;    
  color: #ff4d6d;    
  text-shadow: 0 0 20px #ff1a1a;    
}    
    
input {    
  padding: 10px;    
  margin: 10px;    
  border-radius: 10px;    
  border: none;    
  outline: none;    
  font-size: 1rem;    
}    
    
button {    
  padding: 10px 20px;    
  border: none;    
  border-radius: 20px;    
  background: linear-gradient(45deg, #ff1a1a, #ff6600);    
  color: white;    
  font-weight: bold;    
  cursor: pointer;    
  box-shadow: 0 0 15px red;    
  transition: 0.3s;    
}    
    
button:hover {    
  transform: scale(1.1);    
}  

button:disabled {
  opacity: 0.6;
}
    
.progress-text {  
  margin-top: 15px;  
  opacity: 0;  
}  
  
.progress-bar {  
  width: 250px;  
  height: 10px;  
  background: #330000;  
  border-radius: 10px;  
  margin: 10px auto;  
  overflow: hidden;  
  opacity: 0;  
}  
  
.progress-fill {  
  height: 100%;  
  width: 0%;  
  background: linear-gradient(90deg, red, orange);  
}  

/* NEW: Flames animation text */
.flames-anim {
  margin-top: 10px;
  font-size: 1.2rem;
  letter-spacing: 8px;
  opacity: 0;
  transition: 0.3s;
}
.flames-anim span {
  display: inline-block;
  transition: 0.3s;
}
.flames-anim .removed {
  opacity: 0;
  transform: scale(0);
}
    
.result {    
  margin-top: 20px;    
  font-size: 1.5rem;    
  opacity: 0;    
  transform: scale(0.5);  
  transition: 0.5s;    
}    
  
.result.show {  
  opacity: 1;
  transform: scale(1.2);  
  text-shadow: 0 0 20px red;  
}  
    
.flame {    
  font-size: 2rem;    
  animation: flame 1s infinite alternate;    
}    
    
@keyframes flame {    
  from { text-shadow: 0 0 10px orange; }    
  to { text-shadow: 0 0 25px red; }    
}    
</style>    
</head>    
    
<body>    
    
<div class="container">    
  <h1 class="flame">🔥 FLAMES 🔥</h1>    
    
  <input type="text" id="name1" placeholder="Your Name">    
  <input type="text" id="name2" placeholder="Her / His Name">    
  <br>    
  <button id="btn">Check Relationship ❤️</button>    
  
  <div class="progress-text" id="progressText">Calculating your relationship... ❤️</div>  
  <div class="progress-bar" id="progressBar">  
    <div class="progress-fill" id="progressFill"></div>  
  </div>  

  <!-- NEW animation line -->
  <div class="flames-anim" id="flamesAnim"></div>
    
  <div class="result" id="result"></div>    
</div>    
    
<script>    
function createHearts() {    
  const heart = document.createElement("div");    
  heart.classList.add("heart");    
  heart.innerHTML = "❤";    
  heart.style.left = Math.random() * 100 + "vw";    
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";    
  document.body.appendChild(heart);    
  setTimeout(() => heart.remove(), 6000);    
}    
setInterval(createHearts, 300);    

document.getElementById("btn").addEventListener("click", startCalculation);

function startCalculation() {  
  const n1 = name1.value.trim();
  const n2 = name2.value.trim();
  if (!n1 || !n2) return alert("Enter both names 😅");

  btn.disabled = true;
  result.classList.remove("show");
  result.innerHTML = "";

  progressText.style.opacity = 1;
  progressBar.style.opacity = 1;
  progressFill.style.width = "0%";

  let p = 0;
  let int = setInterval(()=>{
    p+=5;
    progressFill.style.width = p+"%";
    if(p>=100){
      clearInterval(int);
      setTimeout(()=>{
        progressText.style.opacity=0;
        progressBar.style.opacity=0;
        animateFlames(); // NEW
      },400);
    }
  },60);
}

// 🔥 VISUAL + LOGIC COMBINED
function animateFlames(){
  let flames = ['F','L','A','M','E','S'];
  let count = getCount();
  let index = 0;

  flamesAnim.style.opacity = 1;
  renderFlames(flames);

  function step(){
    if(flames.length === 1){
      showResult(flames[0]);
      return;
    }

    index = (index + count - 1) % flames.length;

    let spans = flamesAnim.querySelectorAll("span");
    spans[index].classList.add("removed");

    setTimeout(()=>{
      flames.splice(index,1);
      renderFlames(flames);
      setTimeout(step,500);
    },400);
  }

  setTimeout(step,600);
}

function renderFlames(arr){
  flamesAnim.innerHTML = arr.map(l=>`<span>${l}</span>`).join('');
}

function getCount(){
  let a = name1.value.toLowerCase().replace(/ /g,'').split('');
  let b = name2.value.toLowerCase().replace(/ /g,'').split('');

  for(let i=0;i<a.length;i++){
    let idx = b.indexOf(a[i]);
    if(idx!=-1){
      a[i]='';
      b[idx]='';
    }
  }
  let count = (a.join('')+b.join('')).length;
  return count || 1;
}

function showResult(letter){
  const meanings = {
    F:"Friend ❤️",
    L:"Love 💖",
    A:"Affection 💕",
    M:"Marriage 💍",
    E:"Enemy 💔",
    S:"Sister 🤝"
  };

  result.innerHTML = "Result: "+meanings[letter]+" 🔥";
  result.classList.add("show");
  btn.disabled = false;
}
</script>    
    
</body>    
</html>
