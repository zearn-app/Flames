<!DOCTYPE html>    
<html lang="en">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>FLAMES Calculator </title>    
    
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">    
    
<style>    
body {    
  margin: 0;    
  height: 100vh;    
  font-family: 'Poppins', sans-serif;    
  background: radial-gradient(circle at top, #1a0000, #000);    
  overflow: hidden;    
  color: white;    
}    
    
.heart, .emoji-fall {    
  position: absolute;    
  animation: float 6s linear infinite;    
}    
    
@keyframes float {    
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }    
  50% { opacity: 1; }    
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }    
}    
    
.container {    
  position: absolute;    
  top: 50%;    
  left: 50%;    
  transform: translate(-50%, -50%);    
  text-align: center;    
}    
    
h1 {    
  font-size: 3rem;    
  color: #ff4d6d;    
  text-shadow: 0 0 20px #ff1a1a;    
}    
    
input {    
  padding: 10px;    
  margin: 10px;    
  border-radius: 10px;    
  border: none;    
  outline: none;    
  font-size: 1rem;    
}    
    
button {    
  padding: 10px 20px;    
  border: none;    
  border-radius: 20px;    
  background: linear-gradient(45deg, #ff1a1a, #ff6600);    
  color: white;    
  font-weight: bold;    
  cursor: pointer;    
  box-shadow: 0 0 15px red;    
  transition: 0.3s;    
  margin: 5px;
}    
    
button:hover {    
  transform: scale(1.1);    
}  

button:disabled {
  opacity: 0.6;
}
    
.progress-text {  
  margin-top: 15px;  
  opacity: 0;  
}  
  
.progress-bar {  
  width: 250px;  
  height: 10px;  
  background: #330000;  
  border-radius: 10px;  
  margin: 10px auto;  
  overflow: hidden;  
  opacity: 0;  
}  
  
.progress-fill {  
  height: 100%;  
  width: 0%;  
  background: linear-gradient(90deg, red, orange);  
}  

.flames-anim {
  margin-top: 10px;
  font-size: 1.2rem;
  letter-spacing: 8px;
  opacity: 0;
}
.flames-anim span {
  display: inline-block;
  transition: 0.3s;
}
.flames-anim .removed {
  opacity: 0;
  transform: scale(0);
}
    
.result {    
  margin-top: 20px;    
  font-size: 1.5rem;    
  opacity: 0;    
  transform: scale(0.5);  
  transition: 0.5s;    
}    
  
.result.show {  
  opacity: 1;
  transform: scale(1.2);  
  text-shadow: 0 0 20px red;  
}  
    
.flame {    
  font-size: 2rem;    
  animation: flame 1s infinite alternate;    
}    
    
@keyframes flame {    
  from { text-shadow: 0 0 10px orange; }    
  to { text-shadow: 0 0 25px red; }    
}    

/* NEW Share Buttons */
.share-box{
  margin-top:10px;
  display:none;
}
</style>    
</head>    
    
<body>    
    
<div class="container">    
  <h1 class="flame">🔥 FLAMES </h1>    
    
  <input type="text" id="name1" placeholder="Your Name">    
  <input type="text" id="name2" placeholder="Her / His Name">    
  <br>    
  <button id="btn">Check Relationship ❤️</button>    
  
  <div class="progress-text" id="progressText">Calculating your relationship... ❤️</div>  
  <div class="progress-bar" id="progressBar">  
    <div class="progress-fill" id="progressFill"></div>  
  </div>  

  <div class="flames-anim" id="flamesAnim"></div>
    
  <div class="result" id="result"></div>    

  <!-- NEW SHARE -->
  <div class="share-box" id="shareBox">
    <button onclick="shareWhatsApp()">📲 WhatsApp</button>
    <button onclick="copyResult()">📋 Copy</button>
  </div>

</div>    
   <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script> 
<script>    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
    
function createHearts() {    
  const heart = document.createElement("div");    
  heart.classList.add("heart");    
  heart.innerHTML = "❤";    
  heart.style.left = Math.random() * 100 + "vw";    
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";    
  document.body.appendChild(heart);    
  setTimeout(() => heart.remove(), 6000);    
}    
setInterval(createHearts, 300);    

btn.addEventListener("click", startCalculation);

let finalText = "";
let finalEmoji = "❤️";

function startCalculation() {  
  const n1 = name1.value.trim();
  const n2 = name2.value.trim();
  if (!n1 || !n2) return alert("Enter both names 😅");

  btn.disabled = true;
  result.classList.remove("show");
  result.innerHTML = "";
  flamesAnim.innerHTML = "";
  flamesAnim.style.opacity = 0;
  shareBox.style.display = "none";

  progressText.style.opacity = 1;
  progressBar.style.opacity = 1;
  progressFill.style.width = "0%";

  let p = 0;
  let int = setInterval(()=>{
    p+=5;
    progressFill.style.width = p+"%";
    if(p>=100){
      clearInterval(int);
      setTimeout(()=>{
        progressText.style.opacity=0;
        progressBar.style.opacity=0;
        animateFlames();
      },400);
    }
  },60);
}

function animateFlames(){
  let flames = ['F','L','A','M','E','S'];
  let count = getCount();
  let index = 0;

  flamesAnim.style.opacity = 1;

  function step(){
    if(flames.length === 1){
      showResult(flames[0]);
      return;
    }

    index = (index + count - 1) % flames.length;

    renderFlames(flames, index);

    setTimeout(()=>{
      flames.splice(index,1);
      if(index >= flames.length) index = 0;
      setTimeout(step,500);
    },500);
  }

  step();
}

function renderFlames(arr, removeIndex){
  flamesAnim.innerHTML = arr.map((l,i)=>
    `<span class="${i===removeIndex ? 'removed':''}">${l}</span>`
  ).join('');
}

function getCount(){
  let a = name1.value.toLowerCase().replace(/ /g,'').split('');
  let b = name2.value.toLowerCase().replace(/ /g,'').split('');

  for(let i=0;i<a.length;i++){
    let idx = b.indexOf(a[i]);
    if(idx!=-1){
      a[i]='';
      b[idx]='';
    }
  }

  return (a.join('')+b.join('')).length || 1;
}

async function showResult(letter){
  const meanings = {
    F:["Friend ❤️","🤝"],
    L:["Love 💖","💖"],
    A:["Affection 💕","💕"],
    M:["Marriage 💍","💍"],
    E:["Enemy 💔","💔"],
    S:["Sister 🤝","🤗"]
  };

  finalText = meanings[letter][0];
  finalEmoji = meanings[letter][1];

  result.innerHTML = "Result: "+finalText+" 🔥";
  result.classList.add("show");

  createEmojiRain(finalEmoji);

  shareBox.style.display = "block";
  btn.disabled = false;

  // 🔥 SAVE TO FIREBASE
  try {
    await addDoc(collection(db, "flamesResults"), {
      name1: name1.value,
      name2: name2.value,
      result: finalText,
      timestamp: new Date()
    });
    console.log("Saved to Firebase ✅");
  } catch (e) {
    console.error("Error saving:", e);
  }
      }
/* EMOJI RAIN */
function createEmojiRain(emoji){
  for(let i=0;i<25;i++){
    let e = document.createElement("div");
    e.classList.add("emoji-fall");
    e.innerHTML = emoji;
    e.style.left = Math.random()*100+"vw";
    e.style.fontSize = (Math.random()*20+15)+"px";
    e.style.animationDuration = (Math.random()*3+3)+"s";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),5000);
  }
}

/* SHARE */
function shareWhatsApp(){
  const text = `🔥 FLAMES Result 🔥\n${name1.value} ❤️ ${name2.value}\n👉 ${finalText}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

function copyResult(){
  const text = `🔥 FLAMES Result 🔥\n${name1.value} ❤️ ${name2.value}\n👉 ${finalText}`;
  navigator.clipboard.writeText(text);
  alert("Copied to clipboard 📋");
}
</script>    
    
</body>    
</html>
