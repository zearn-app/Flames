<!DOCTYPE html>    
<html lang="en">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>FLAMES Calculator</title>    

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">    

<style>    
:root{
  --accent:red;
  --accent2:orange;
}

body {    
  margin: 0;    
  height: 100vh;    
  font-family: 'Poppins', sans-serif;    
  background: radial-gradient(circle at top, #1a0000, #000);    
  overflow: hidden;    
  color: white;    
}

/* BACKGROUND GLOW */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(circle, var(--accent), transparent);
  opacity:0.15;
  animation: bgMove 10s linear infinite;
}
@keyframes bgMove{
  0%{transform:translate(-25%,-25%)}
  50%{transform:translate(0%,0%)}
  100%{transform:translate(-25%,-25%)}
}

/* FLOAT */
.heart, .emoji-fall, .spark {    
  position: absolute;    
  animation: float 6s linear infinite;    
}    

.spark{
  width:4px;
  height:4px;
  background:var(--accent2);
  border-radius:50%;
}



@keyframes float {
  0% {
    transform: translateY(100vh) translateX(0px) scale(0.5) rotate(0deg);
    opacity: 0;
  }
  30% {
    opacity: 1;
  }
  50% {
    transform: translateY(50vh) translateX(20px) rotate(120deg);
  }
  75% {
    transform: translateY(20vh) translateX(-20px) rotate(240deg);
  }
  100% {
    transform: translateY(-10vh) translateX(10px) scale(1.2) rotate(360deg);
    opacity: 0;
  }
}








.container {    
  position: absolute;    
  top: 50%;    
  left: 50%;    
  transform: translate(-50%, -50%);    
  text-align: center;    
}

h1 {    
  font-size: 3rem;    
  color: #ff4d6d;    
  text-shadow: 0 0 20px var(--accent);    
}    

input {    
  padding: 10px;    
  margin: 10px;    
  border-radius: 10px;    
  border: none;    
  outline: none;    
}    

button {    
  padding: 10px 20px;    
  border-radius: 20px;    
  border:none;
  background: linear-gradient(45deg, var(--accent), var(--accent2));    
  color: white;    
  cursor: pointer;    
  box-shadow: 0 0 15px var(--accent);    
  transition: 0.3s;    
}    

button:hover { transform: scale(1.1); }  

.progress-bar{
  width:250px;
  height:10px;
  background:#330000;
  border-radius:10px;
  margin:10px auto;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}

.result{
  margin-top:20px;
  font-size:1.5rem;
  opacity:0;
  transform:scale(0.5);
  transition:0.5s;
}
.result.show{
  opacity:1;
  transform:scale(1.2);
  text-shadow:0 0 20px var(--accent);
}

.share-box{ display:none; }
</style>    
</head>    

<body>    

<div class="container" id="mainBox">    
  <h1>❤️ FLAMES</h1>    

  <input type="text" id="name1" placeholder="Your Name">    
  <input type="text" id="name2" placeholder="Her / His Name">    
  <br>    
  <button id="btn">Check Relationship ❤️</button>    

  <div class="progress-bar">  
    <div class="progress-fill" id="progressFill"></div>  
  </div>  

  <div class="flames-anim" id="flamesAnim"></div>
  <div class="result" id="result"></div>    

  <div class="share-box" id="shareBox">
    <button onclick="shareWhatsApp()">📲 WhatsApp</button>
    <button onclick="copyResult()">📋 Copy</button>
  </div>
</div>    

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOU5TRy80JkKhWEwbNIe9Ei5-e_QztN3k",
  authDomain: "zearn-app.firebaseapp.com",
  projectId: "zearn-app",
  storageBucket: "zearn-app.firebasestorage.app",
  messagingSenderId: "212045636123",
  appId: "1:212045636123:web:094d48241261d61b050ebe"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DOM */
const name1 = document.getElementById("name1");
const name2 = document.getElementById("name2");
const btn = document.getElementById("btn");
const result = document.getElementById("result");
const progressFill = document.getElementById("progressFill");
const shareBox = document.getElementById("shareBox");

/* THEME CHANGE */
function applyTheme(letter){
  const themes={
    F:["#00c6ff","#0072ff"],
    L:["#ff4d6d","#ff1a1a"],
    A:["#ff9a9e","#fad0c4"],
    M:["#a18cd1","#fbc2eb"],
    E:["#434343","#000000"],
    S:["#00ff87","#60efff"]
  };
  document.documentElement.style.setProperty("--accent",themes[letter][0]);
  document.documentElement.style.setProperty("--accent2",themes[letter][1]);
}

/* FLOATING */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

btn.addEventListener("click", startCalculation);

let finalText="";
let finalEmoji="❤️";

function startCalculation(){
  const n1=name1.value.trim();
  const n2=name2.value.trim();
  if(!n1||!n2) return alert("Enter both names 😅");

  let p=0;
  let int=setInterval(()=>{
    p+=20;
    progressFill.style.width=p+"%";
    if(p>=100){
      clearInterval(int);
      animateFlames();
    }
  },60);
}

function animateFlames(){
  let flames=['F','L','A','M','E','S'];
  let count=getCount();
  let index=0;

  function step(){
    if(flames.length===1){
      showResult(flames[0]);
      return;
    }
    index=(index+count-1)%flames.length;
    setTimeout(()=>{
      flames.splice(index,1);
      if(index>=flames.length) index=0;
      setTimeout(step,120);
    },120);
  }
  step();
}

function getCount(){
  let a=name1.value.toLowerCase().replace(/ /g,'').split('');
  let b=name2.value.toLowerCase().replace(/ /g,'').split('');
  for(let i=0;i<a.length;i++){
    let idx=b.indexOf(a[i]);
    if(idx!=-1){a[i]='';b[idx]='';}
  }
  return (a.join('')+b.join('')).length||1;
}

async function showResult(letter){
  const meanings={
    F:["Friend ❤️","🤝"],
    L:["Love 💖","💖"],
    A:["Affection 💕","💕"],
    M:["Marriage 💍","💍"],
    E:["Enemy ☠️","⚔️"],
    S:["Sister 🤝","🤗"]
  };

  applyTheme(letter);

  finalText=meanings[letter][0];
  finalEmoji=meanings[letter][1];

  result.innerHTML = "Relationship: " + finalText + " 🔥";
  result.classList.add("show");

  createEmojiRain(finalEmoji);

  shareBox.style.display="block";

  await addDoc(collection(db,"flamesResults"),{
    name1:name1.value,
    name2:name2.value,
    result:finalText,
    timestamp:new Date()
  });
}

function createEmojiRain(e){
  for(let i=0;i<25;i++){
    let d=document.createElement("div");
    d.className="emoji-fall";
    d.innerHTML=e;
    


d.style.left = Math.random() * 100 + "vw";
d.style.fontSize = (Math.random() * 20 + 15) + "px";

// random speed
d.style.animationDuration = (Math.random() * 3 + 3) + "s";

// random delay (this breaks straight-line effect)
d.style.animationDelay = (Math.random() * 2) + "s";

// slight horizontal drift variation
d.style.transform = `translateX(${Math.random()*50 - 25}px)`;



    document.body.appendChild(d);
    setTimeout(()=>d.remove(),5000);
  }
}

function shareWhatsApp(){
  const text=`🔥 FLAMES Result 🔥\n${name1.value} ❤️ ${name2.value}\n👉 ${finalText}`;
 

window.location.href = `https://wa.me/?text=${encodeURIComponent(text)}`;

function copyResult(){
  const text = `🔥 FLAMES Result 🔥
${name1.value} ❤️ ${name2.value}
👉 ${finalText}`;

  if(navigator.clipboard){
    navigator.clipboard.writeText(text)
      .then(()=> alert("Copied 📋"))
      .catch(()=> fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);
  alert("Copied 📋");
}
</script>    
</body>    
</html>
