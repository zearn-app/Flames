<!DOCTYPE html>    
<html lang="en">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>FLAMES Calculator 🔥</title>    
    
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">    
    
<style>    
body {    
  margin: 0;    
  height: 100vh;    
  font-family: 'Poppins', sans-serif;    
  background: radial-gradient(circle at top, #1a0000, #000);    
  overflow: hidden;    
  color: white;    
}    
    
.heart {    
  position: absolute;    
  color: rgba(255, 0, 100, 0.6);    
  animation: float 6s linear infinite;    
}    
    
@keyframes float {    
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }    
  50% { opacity: 1; }    
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }    
}    
    
.container {    
  position: absolute;    
  top: 50%;    
  left: 50%;    
  transform: translate(-50%, -50%);    
  text-align: center;    
}    
    
h1 {    
  font-size: 3rem;    
  color: #ff4d6d;    
  text-shadow: 0 0 20px #ff1a1a;    
}    
    
input {    
  padding: 10px;    
  margin: 10px;    
  border-radius: 10px;    
  border: none;    
  outline: none;    
  font-size: 1rem;    
}    
    
button {    
  padding: 10px 20px;    
  border: none;    
  border-radius: 20px;    
  background: linear-gradient(45deg, #ff1a1a, #ff6600);    
  color: white;    
  font-weight: bold;    
  cursor: pointer;    
  box-shadow: 0 0 15px red;    
  transition: 0.3s;    
}    
    
button:hover {    
  transform: scale(1.1);    
}  

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
    
.progress-text {  
  margin-top: 15px;  
  font-size: 1rem;  
  opacity: 0;  
  transition: 0.3s;
}  
  
.progress-bar {  
  width: 250px;  
  height: 10px;  
  background: #330000;  
  border-radius: 10px;  
  margin: 10px auto;  
  overflow: hidden;  
  opacity: 0;  
  transition: 0.3s;
}  
  
.progress-fill {  
  height: 100%;  
  width: 0%;  
  background: linear-gradient(90deg, red, orange);  
  transition: width 0.1s linear;  
}  
    
.result {    
  margin-top: 20px;    
  font-size: 1.5rem;    
  opacity: 0;    
  transform: scale(0.5);  
  transition: all 0.5s ease;    
}    
  
.result.show {  
  opacity: 1 !important;
  transform: scale(1.2);  
  text-shadow: 0 0 20px red;  
}  
    
.flame {    
  font-size: 2rem;    
  animation: flame 1s infinite alternate;    
}    
    
@keyframes flame {    
  from { text-shadow: 0 0 10px orange; }    
  to { text-shadow: 0 0 25px red; }    
}    
</style>    
</head>    
    
<body>    
    
<div class="container">    
  <h1 class="flame">🔥 FLAMES 🔥</h1>    
    
  <input type="text" id="name1" placeholder="Your Name">    
  <input type="text" id="name2" placeholder="Her / His Name">    
  <br>    
  <button id="btn">Check Relationship ❤️</button>    
  
  <div class="progress-text" id="progressText">Calculating your relationship... ❤️</div>  
  <div class="progress-bar" id="progressBar">  
    <div class="progress-fill" id="progressFill"></div>  
  </div>  
    
  <div class="result" id="result"></div>    
</div>    
    
<script>    
function createHearts() {    
  const heart = document.createElement("div");    
  heart.classList.add("heart");    
  heart.innerHTML = "❤";    
  heart.style.left = Math.random() * 100 + "vw";    
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";    
  document.body.appendChild(heart);    
  setTimeout(() => heart.remove(), 6000);    
}    
setInterval(createHearts, 300);    

document.getElementById("btn").addEventListener("click", startCalculation);

function startCalculation() {  
  const name1 = document.getElementById("name1").value.trim();
  const name2 = document.getElementById("name2").value.trim();

  if (!name1 || !name2) {
    alert("Enter both names 😅");
    return;
  }

  const btn = document.getElementById("btn");
  const progressText = document.getElementById("progressText");  
  const progressBar = document.getElementById("progressBar");  
  const progressFill = document.getElementById("progressFill");  
  const resultDiv = document.getElementById("result");  

  btn.disabled = true;

  // FULL RESET (important fix)
  resultDiv.classList.remove("show");  
  resultDiv.style.opacity = "0";
  resultDiv.innerHTML = "";

  progressText.style.opacity = "1";  
  progressBar.style.opacity = "1";  
  progressFill.style.width = "0%";  

  let progress = 0;  

  let interval = setInterval(() => {  
    progress += 5;  
    progressFill.style.width = progress + "%";  

    if (progress >= 100) {  
      clearInterval(interval);  

      setTimeout(() => {  
        progressText.style.opacity = "0";  
        progressBar.style.opacity = "0";  

        showResult(); // ← guaranteed call

        btn.disabled = false;
      }, 500);  
    }  
  }, 60);  
}  

function showResult() {
  const resultDiv = document.getElementById("result");

  const final = calculateFlames();

  resultDiv.innerHTML = "Result: " + final + " 🔥";

  // force reflow (important fix)
  resultDiv.offsetHeight;

  resultDiv.classList.add("show");
}

function calculateFlames() {    
  let name1 = document.getElementById("name1").value.toLowerCase().replace(/ /g,'');    
  let name2 = document.getElementById("name2").value.toLowerCase().replace(/ /g,'');    
    
  let arr1 = name1.split('');    
  let arr2 = name2.split('');    
    
  for (let i = 0; i < arr1.length; i++) {    
    let index = arr2.indexOf(arr1[i]);    
    if (index !== -1) {    
      arr1[i] = '';    
      arr2[index] = '';    
    }    
  }    
    
  let count = (arr1.join('') + arr2.join('')).length || 1;    
    
  let flames = ['F','L','A','M','E','S'];    
  let meanings = {    
    F: "Friend ❤️",    
    L: "Love 💖",    
    A: "Affection 💕",    
    M: "Marriage 💍",    
    E: "Enemy 💔",    
    S: "Sister 🤝"    
  };    
    
  let index = 0;    
    
  while (flames.length > 1) {    
    index = (index + count - 1) % flames.length;    
    flames.splice(index, 1);    
  }    
    
  return meanings[flames[0]];
}    
</script>    
    
</body>    
</html>
