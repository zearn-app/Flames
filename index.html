<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>FLAMES Calculator 🔥</title>  
  
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">  
  
<style>  
body {  
  margin: 0;  
  height: 100vh;  
  font-family: 'Poppins', sans-serif;  
  background: radial-gradient(circle at top, #1a0000, #000);  
  overflow: hidden;  
  color: white;  
}  
  
/* Floating hearts */  
.heart {  
  position: absolute;  
  color: rgba(255, 0, 100, 0.6);  
  animation: float 6s linear infinite;  
}  
  
@keyframes float {  
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }  
  50% { opacity: 1; }  
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }  
}  
  
/* Container */  
.container {  
  position: absolute;  
  top: 50%;  
  left: 50%;  
  transform: translate(-50%, -50%);  
  text-align: center;  
}  
  
/* Title glow */  
h1 {  
  font-size: 3rem;  
  color: #ff4d6d;  
  text-shadow: 0 0 20px #ff1a1a;  
}  
  
/* Inputs */  
input {  
  padding: 10px;  
  margin: 10px;  
  border-radius: 10px;  
  border: none;  
  outline: none;  
  font-size: 1rem;  
}  
  
/* Button */  
button {  
  padding: 10px 20px;  
  border: none;  
  border-radius: 20px;  
  background: linear-gradient(45deg, #ff1a1a, #ff6600);  
  color: white;  
  font-weight: bold;  
  cursor: pointer;  
  box-shadow: 0 0 15px red;  
  transition: 0.3s;  
}  
  
button:hover {  
  transform: scale(1.1);  
}  
  
/* Progress section */
.progress-text {
  margin-top: 15px;
  font-size: 1rem;
  opacity: 0;
}

.progress-bar {
  width: 250px;
  height: 10px;
  background: #330000;
  border-radius: 10px;
  margin: 10px auto;
  overflow: hidden;
  opacity: 0;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, red, orange);
  transition: width 0.3s;
}

/* Result box */  
.result {  
  margin-top: 20px;  
  font-size: 1.5rem;  
  opacity: 0;  
  transform: scale(0.5);
  transition: 0.5s;  
}  

.result.show {
  opacity: 1;
  transform: scale(1.2);
  text-shadow: 0 0 20px red;
}

/* Flames animation */  
.flame {  
  font-size: 2rem;  
  animation: flame 1s infinite alternate;  
}  
  
@keyframes flame {  
  from { text-shadow: 0 0 10px orange; }  
  to { text-shadow: 0 0 25px red; }  
}  
</style>  
</head>  
  
<body>  
  
<div class="container">  
  <h1 class="flame">🔥 FLAMES 🔥</h1>  
  
  <input type="text" id="name1" placeholder="Your Name">  
  <input type="text" id="name2" placeholder="Her / His Name">  
  <br>  
  <button onclick="startCalculation()">Check Relationship ❤️</button>  

  <div class="progress-text" id="progressText">Calculating your relationship... ❤️</div>
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  
  <div class="result" id="result"></div>  
</div>  
  
<script>  
// Floating hearts generator  
function createHearts() {  
  const heart = document.createElement("div");  
  heart.classList.add("heart");  
  heart.innerHTML = "❤";  
  heart.style.left = Math.random() * 100 + "vw";  
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";  
  document.body.appendChild(heart);  
  
  setTimeout(() => {  
    heart.remove();  
  }, 6000);  
}  
setInterval(createHearts, 300);  

function startCalculation() {
  const progressText = document.getElementById("progressText");
  const progressBar = document.getElementById("progressBar");
  const progressFill = document.getElementById("progressFill");
  const resultDiv = document.getElementById("result");

  resultDiv.classList.remove("show");
  resultDiv.style.opacity = 0;

  progressText.style.opacity = 1;
  progressBar.style.opacity = 1;
  progressFill.style.width = "0%";

  let progress = 0;

  let interval = setInterval(() => {
    progress += 5;
    progressFill.style.width = progress + "%";

    if (progress >= 100) {
      clearInterval(interval);
      setTimeout(() => {
        progressText.style.opacity = 0;
        progressBar.style.opacity = 0;
        calculateFlames();
      }, 500);
    }
  }, 80);
}

// FLAMES logic  
function calculateFlames() {  
  let name1 = document.getElementById("name1").value.toLowerCase().replace(/ /g,'');  
  let name2 = document.getElementById("name2").value.toLowerCase().replace(/ /g,'');  
  
  let arr1 = name1.split('');  
  let arr2 = name2.split('');  
  
  // Remove common letters  
  for (let i = 0; i < arr1.length; i++) {  
    let index = arr2.indexOf(arr1[i]);  
    if (index !== -1) {  
      arr1[i] = '';  
      arr2[index] = '';  
    }  
  }  
  
  let count = (arr1.join('') + arr2.join('')).length;  
  
  let flames = ['F','L','A','M','E','S'];  
  let meanings = {  
    F: "Friend ❤️",  
    L: "Love 💖",  
    A: "Affection 💕",  
    M: "Marriage 💍",  
    E: "Enemy 💔",  
    S: "Sister 🤝"  
  };  
  
  let index = 0;  
  
  while (flames.length > 1) {  
    index = (index + count - 1) % flames.length;  
    flames.splice(index, 1);  
  }  
  
  let final = flames[0];  
  
  let resultDiv = document.getElementById("result");  
  resultDiv.innerHTML = "Result: " + meanings[final] + " 🔥";  
  resultDiv.classList.add("show");
}  
</script>  
  
</body>  
</html>
