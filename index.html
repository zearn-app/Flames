<!DOCTYPE html>    
<html lang="en">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>FLAMES Calculator</title>    

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">    

<style>    
body {    
  margin: 0;    
  height: 100vh;    
  font-family: 'Poppins', sans-serif;    
  background: radial-gradient(circle at top, #1a0000, #000);    
  overflow: hidden;    
  color: white;    
}

/* BACKGROUND GLOW */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(circle, rgba(255,0,0,0.1), transparent);
  animation: bgMove 10s linear infinite;
}
@keyframes bgMove{
  0%{transform:translate(-25%,-25%)}
  50%{transform:translate(0%,0%)}
  100%{transform:translate(-25%,-25%)}
}

/* FLOATING ELEMENTS */
.heart, .emoji-fall, .spark {    
  position: absolute;    
  animation: float 6s linear infinite;    
}    

.spark{
  width:4px;
  height:4px;
  background:orange;
  border-radius:50%;
}

@keyframes float {    
  0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }    
  50% { opacity: 1; }    
  100% { transform: translateY(-10vh) scale(1.2) rotate(360deg); opacity: 0; }    
}    

.container {    
  position: absolute;    
  top: 50%;    
  left: 50%;    
  transform: translate(-50%, -50%);    
  text-align: center;    
}

/* TITLE */
h1 {    
  font-size: 3rem;    
  color: #ff4d6d;    
  animation: glow 2s infinite alternate;
}
@keyframes glow{
  from{ text-shadow:0 0 10px red;}
  to{ text-shadow:0 0 30px orange;}
}

/* INPUT */
input {    
  padding: 10px;    
  margin: 10px;    
  border-radius: 10px;    
  border: none;    
  outline: none;    
  transition:0.3s;
}
input:focus{
  transform:scale(1.05);
  box-shadow:0 0 15px red;
}

/* BUTTON */
button {    
  padding: 10px 20px;    
  border-radius: 20px;    
  border:none;
  background: linear-gradient(45deg, #ff1a1a, #ff6600);    
  color: white;    
  cursor: pointer;    
  box-shadow: 0 0 15px red;    
  transition: 0.3s;    
  position:relative;
  overflow:hidden;
}    

button:hover { transform: scale(1.1); }  

button::after{
  content:"";
  position:absolute;
  width:10px;
  height:10px;
  background:white;
  border-radius:50%;
  opacity:0.5;
  transform:scale(0);
  transition:0.5s;
}
button:active::after{
  transform:scale(20);
  opacity:0;
}

button:disabled { opacity:0.6; }

/* PROGRESS */
.progress-text, .progress-bar{
  opacity:0;
  transition:0.5s;
}
.progress-bar{
  width:250px;
  height:10px;
  background:#330000;
  border-radius:10px;
  margin:10px auto;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,red,orange);
  transition:width 0.2s;
}

/* FLAMES */
.flames-anim{
  margin-top:10px;
  letter-spacing:8px;
}
.flames-anim span{
  display:inline-block;
  transition:0.3s;
}
.flames-anim .removed{
  opacity:0;
  transform:scale(0);
}

/* RESULT */
.result{
  margin-top:20px;
  font-size:1.5rem;
  opacity:0;
  transform:scale(0.5);
  transition:0.5s;
}
.result.show{
  opacity:1;
  transform:scale(1.2);
  text-shadow:0 0 20px red;
}

/* RESULT BURST */
@keyframes burst{
  0%{transform:scale(0.5)}
  50%{transform:scale(1.4)}
  100%{transform:scale(1.2)}
}
.result.show{
  animation:burst 0.6s ease;
}

.share-box{ margin-top:10px; display:none; }

/* SHAKE */
@keyframes shake{
  0%{transform:translate(-50%,-50%)}
  25%{transform:translate(-48%,-52%)}
  50%{transform:translate(-52%,-48%)}
  75%{transform:translate(-49%,-51%)}
  100%{transform:translate(-50%,-50%)}
}
</style>    
</head>    

<body>    

<div class="container" id="mainBox">    
  <h1>🔥 FLAMES</h1>    

  <input type="text" id="name1" placeholder="Your Name">    
  <input type="text" id="name2" placeholder="Her / His Name">    
  <br>    
  <button id="btn">Check Relationship ❤️</button>    

  <div class="progress-text" id="progressText">Calculating your relationship... ❤️</div>  
  <div class="progress-bar" id="progressBar">  
    <div class="progress-fill" id="progressFill"></div>  
  </div>  

  <div class="flames-anim" id="flamesAnim"></div>
  <div class="result" id="result"></div>    

  <div class="share-box" id="shareBox">
    <button onclick="shareWhatsApp()">📲 WhatsApp</button>
    <button onclick="copyResult()">📋 Copy</button>
  </div>
</div>    

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOU5TRy80JkKhWEwbNIe9Ei5-e_QztN3k",
  authDomain: "zearn-app.firebaseapp.com",
  projectId: "zearn-app",
  storageBucket: "zearn-app.firebasestorage.app",
  messagingSenderId: "212045636123",
  appId: "1:212045636123:web:094d48241261d61b050ebe"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DOM */
const name1 = document.getElementById("name1");
const name2 = document.getElementById("name2");
const btn = document.getElementById("btn");
const result = document.getElementById("result");
const flamesAnim = document.getElementById("flamesAnim");
const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");
const progressFill = document.getElementById("progressFill");
const shareBox = document.getElementById("shareBox");
const mainBox = document.getElementById("mainBox");

/* BACKGROUND PARTICLES */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

setInterval(()=>{
  const s=document.createElement("div");
  s.className="spark";
  s.style.left=Math.random()*100+"vw";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),6000);
},200);

btn.addEventListener("click", startCalculation);

let finalText="";
let finalEmoji="❤️";

function startCalculation(){
  const n1=name1.value.trim();
  const n2=name2.value.trim();
  if(!n1||!n2) return alert("Enter both names 😅");

  btn.disabled=true;
  result.classList.remove("show");
  result.innerHTML="";
  flamesAnim.innerHTML="";
  shareBox.style.display="none";

  progressText.style.opacity=1;
  progressBar.style.opacity=1;
  progressFill.style.width="0%";

  let p=0;
  let int=setInterval(()=>{
    p+=5;
    progressFill.style.width=p+"%";
    if(p>=100){
      clearInterval(int);
      mainBox.style.animation="shake 0.4s";
      setTimeout(()=>{
        progressText.style.opacity=0;
        progressBar.style.opacity=0;
        animateFlames();
      },400);
    }
  },60);
}

/* FLAMES LOGIC (unchanged) */
function animateFlames(){
  let flames=['F','L','A','M','E','S'];
  let count=getCount();
  let index=0;

  function step(){
    if(flames.length===1){
      showResult(flames[0]);
      return;
    }
    index=(index+count-1)%flames.length;
    renderFlames(flames,index);
    setTimeout(()=>{
      flames.splice(index,1);
      if(index>=flames.length) index=0;
      setTimeout(step,500);
    },500);
  }
  step();
}

function renderFlames(arr,i){
  flamesAnim.innerHTML=arr.map((l,x)=>
    `<span class="${x===i?'removed':''}">${l}</span>`
  ).join('');
}

function getCount(){
  let a=name1.value.toLowerCase().replace(/ /g,'').split('');
  let b=name2.value.toLowerCase().replace(/ /g,'').split('');
  for(let i=0;i<a.length;i++){
    let idx=b.indexOf(a[i]);
    if(idx!=-1){a[i]='';b[idx]='';}
  }
  return (a.join('')+b.join('')).length||1;
}

async function showResult(letter){
  const meanings={
    F:["Friend ❤️","🤝"],
    L:["Love 💖","💖"],
    A:["Affection 💕","💕"],
    M:["Marriage 💍","💍"],
    E:["Enemy 💔","💔"],
    S:["Sister 🤝","🤗"]
  };

  finalText=meanings[letter][0];
  finalEmoji=meanings[letter][1];

  result.innerHTML="Result: "+finalText+" 🔥";
  result.classList.add("show");

  createEmojiRain(finalEmoji);

  shareBox.style.display="block";
  btn.disabled=false;

  try{
    await addDoc(collection(db,"flamesResults"),{
      name1:name1.value,
      name2:name2.value,
      result:finalText,
      timestamp:new Date()
    });
  }catch(e){console.error(e);}
}

function createEmojiRain(e){
  for(let i=0;i<25;i++){
    let d=document.createElement("div");
    d.className="emoji-fall";
    d.innerHTML=e;
    d.style.left=Math.random()*100+"vw";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),5000);
  }
}

function shareWhatsApp(){
  const text=`🔥 FLAMES Result 🔥\n${name1.value} ❤️ ${name2.value}\n👉 ${finalText}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

function copyResult(){
  const text=`🔥 FLAMES Result 🔥\n${name1.value} ❤️ ${name2.value}\n👉 ${finalText}`;
  navigator.clipboard.writeText(text);
  alert("Copied 📋");
}

</script>    
</body>    
</html>
